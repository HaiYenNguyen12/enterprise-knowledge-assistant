

services:

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - qdrant

    env_file:
      - .env

  qdrant:
    image: qdrant/qdrant:latest

    ports:
      - "6333:6333"

    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: